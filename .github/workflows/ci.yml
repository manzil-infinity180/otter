name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gofmt:
    uses: ./.github/workflows/otter.yml
    permissions:
      contents: read
      id-token: write
    with:
      pull_request: ${{ github.event_name == 'pull_request' }}
      step: gofmt
      attestations: "git github environment"
      command: |
        files=$(git ls-files '*.go')
        unformatted=$(gofmt -l $files)
        if [ -n "$unformatted" ]; then
          printf 'Unformatted Go files:\n%s\n' "$unformatted"
          exit 1
        fi

  golangci_lint:
    needs: [gofmt]
    uses: ./.github/workflows/otter.yml
    permissions:
      contents: read
      id-token: write
    with:
      pull_request: ${{ github.event_name == 'pull_request' }}
      step: golangci-lint
      attestations: "git github environment"
      pre-command: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      command: golangci-lint run --timeout=10m ./...

  govet:
    needs: [gofmt]
    uses: ./.github/workflows/otter.yml
    permissions:
      contents: read
      id-token: write
    with:
      pull_request: ${{ github.event_name == 'pull_request' }}
      step: govet
      attestations: "git github environment"
      command: go vet ./...

  gotest:
    needs: [gofmt]
    uses: ./.github/workflows/otter.yml
    permissions:
      contents: read
      id-token: write
    with:
      pull_request: ${{ github.event_name == 'pull_request' }}
      step: gotest
      attestations: "git github environment"
      command: go test ./...

  gobuild:
    needs: [golangci_lint, govet, gotest]
    uses: ./.github/workflows/otter.yml
    permissions:
      contents: read
      id-token: write
    with:
      pull_request: ${{ github.event_name == 'pull_request' }}
      step: gobuild
      attestations: "git github environment"
      command: go build ./...

  frontend_test:
    uses: ./.github/workflows/otter.yml
    permissions:
      contents: read
      id-token: write
    with:
      pull_request: ${{ github.event_name == 'pull_request' }}
      setup-go: false
      setup-node: true
      node-version: "22"
      node-cache-dependency-path: frontend/package-lock.json
      step: frontend-test
      attestations: "git github environment"
      command: cd frontend && npm ci && npm test

  frontend_build:
    needs: [frontend_test]
    uses: ./.github/workflows/otter.yml
    permissions:
      contents: read
      id-token: write
    with:
      pull_request: ${{ github.event_name == 'pull_request' }}
      setup-go: false
      setup-node: true
      node-version: "22"
      node-cache-dependency-path: frontend/package-lock.json
      step: frontend-build
      attestations: "git github environment"
      command: cd frontend && npm ci && npm run build
